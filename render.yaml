services:
  - type: web
    name: campus-placement-api
    runtime: node
    # Free tier spins down after 15 min idle (cold starts ~50s, cron
    # reminders unreliable). Upgrade to "starter" for always-on.
    plan: free
    # --include=dev is required: NODE_ENV=production makes npm ci skip
    # devDependencies, but the build needs TypeScript/Vite/esbuild.
    buildCommand: npm ci --include=dev && npm run build && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # paste your Neon connection string in the dashboard
      - key: JWT_SECRET
        generateValue: true # Render generates a strong random value
      - key: CORS_ORIGIN
        value: https://campus-placement-api.onrender.com
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: OTP_EXPIRY_MINUTES
        value: "10"
      # TEMPORARY until SMTP works from Render (free tier blocks 25/465/587):
      # OTP requests succeed even when the email can't be sent; codes are
      # read from the DB by an admin. Set to "false" once SMTP is fixed.
      - key: OTP_EMAIL_BEST_EFFORT
        value: "true"
